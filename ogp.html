<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<title>Quest Timer OGP</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    background: linear-gradient(170deg, #0a0a1a 0%, #1a0a2e 60%, #0d0d2a 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  /* --- Stars --- */
  .star {
    position: absolute;
    background: #ffffff;
    border-radius: 50%;
    animation: twinkle 2s ease-in-out infinite alternate;
  }
  @keyframes twinkle {
    0% { opacity: 0.3; }
    100% { opacity: 1; }
  }

  /* --- Ground line --- */
  .ground {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 80px;
    background: linear-gradient(to top, #0d0820 0%, transparent 100%);
  }
  .ground::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 2px;
    background: linear-gradient(90deg, transparent 0%, #2a1a4a 20%, #3a2a5a 50%, #2a1a4a 80%, transparent 100%);
  }

  /* --- Vignette overlay --- */
  .vignette {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.5) 100%);
    pointer-events: none;
  }

  /* --- Center content --- */
  .content {
    text-align: center;
    z-index: 10;
    position: relative;
  }

  .title {
    font-family: 'Press Start 2P', monospace;
    font-size: 52px;
    color: #ffd700;
    text-shadow:
      0 0 20px rgba(255, 215, 0, 0.5),
      0 0 40px rgba(255, 215, 0, 0.2),
      3px 3px 0 #b8860b;
    letter-spacing: 4px;
    margin-bottom: 32px;
    line-height: 1.4;
  }

  .subtitle {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 32px;
    font-weight: 700;
    color: #ffffff;
    text-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
    margin-bottom: 24px;
    letter-spacing: 3px;
  }

  .catchcopy {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 18px;
    color: #888888;
    letter-spacing: 6px;
  }

  /* --- Pixel Hero (left bottom) --- */
  .hero {
    position: absolute;
    bottom: 60px;
    left: 100px;
    z-index: 5;
    /* 16x24 pixel art hero using box-shadow on a 6px pixel grid */
    width: 6px;
    height: 6px;
    background: transparent;
    box-shadow:
      /* Helmet */
      24px 0 0 #4a6fa5, 30px 0 0 #4a6fa5, 36px 0 0 #4a6fa5,
      18px 6px 0 #4a6fa5, 24px 6px 0 #5a8fbf, 30px 6px 0 #5a8fbf, 36px 6px 0 #5a8fbf, 42px 6px 0 #4a6fa5,
      /* Face */
      18px 12px 0 #e8b87a, 24px 12px 0 #e8b87a, 30px 12px 0 #e8b87a, 36px 12px 0 #e8b87a, 42px 12px 0 #e8b87a,
      18px 18px 0 #e8b87a, 24px 18px 0 #222, 30px 18px 0 #e8b87a, 36px 18px 0 #222, 42px 18px 0 #e8b87a,
      18px 24px 0 #e8b87a, 24px 24px 0 #e8b87a, 30px 24px 0 #d4956b, 36px 24px 0 #e8b87a, 42px 24px 0 #e8b87a,
      /* Body / Armor */
      12px 30px 0 #2a7a3a, 18px 30px 0 #2a7a3a, 24px 30px 0 #3a9a4a, 30px 30px 0 #3a9a4a, 36px 30px 0 #3a9a4a, 42px 30px 0 #2a7a3a, 48px 30px 0 #2a7a3a,
      12px 36px 0 #2a7a3a, 18px 36px 0 #3a9a4a, 24px 36px 0 #ffd700, 30px 36px 0 #3a9a4a, 36px 36px 0 #ffd700, 42px 36px 0 #3a9a4a, 48px 36px 0 #2a7a3a,
      18px 42px 0 #2a7a3a, 24px 42px 0 #3a9a4a, 30px 42px 0 #3a9a4a, 36px 42px 0 #3a9a4a, 42px 42px 0 #2a7a3a,
      /* Arms */
      6px 36px 0 #e8b87a, 6px 42px 0 #e8b87a, 54px 36px 0 #e8b87a, 54px 42px 0 #e8b87a,
      /* Sword in right hand */
      54px 30px 0 #c0c0c0, 54px 24px 0 #c0c0c0, 54px 18px 0 #c0c0c0, 54px 12px 0 #c0c0c0, 54px 6px 0 #e0e0e0, 54px 0 0 #e0e0e0,
      /* Legs */
      18px 48px 0 #8b6914, 24px 48px 0 #8b6914, 36px 48px 0 #8b6914, 42px 48px 0 #8b6914,
      18px 54px 0 #6b4a0a, 24px 54px 0 #6b4a0a, 36px 54px 0 #6b4a0a, 42px 54px 0 #6b4a0a,
      /* Boots */
      12px 60px 0 #5a3a0a, 18px 60px 0 #5a3a0a, 24px 60px 0 #5a3a0a, 36px 60px 0 #5a3a0a, 42px 60px 0 #5a3a0a, 48px 60px 0 #5a3a0a;
    transform: scale(1.6);
    transform-origin: bottom left;
  }

  /* --- Pixel Slime (right bottom) --- */
  .slime {
    position: absolute;
    bottom: 65px;
    right: 120px;
    z-index: 5;
    width: 6px;
    height: 6px;
    background: transparent;
    box-shadow:
      /* Top of slime */
      18px 0 0 #3a8adf, 24px 0 0 #3a8adf, 30px 0 0 #3a8adf,
      12px 6px 0 #3a8adf, 18px 6px 0 #5abaff, 24px 6px 0 #5abaff, 30px 6px 0 #5abaff, 36px 6px 0 #3a8adf,
      /* Body */
      6px 12px 0 #3a8adf, 12px 12px 0 #5abaff, 18px 12px 0 #7ad0ff, 24px 12px 0 #5abaff, 30px 12px 0 #7ad0ff, 36px 12px 0 #5abaff, 42px 12px 0 #3a8adf,
      6px 18px 0 #3a8adf, 12px 18px 0 #5abaff, 18px 18px 0 #222, 24px 18px 0 #5abaff, 30px 18px 0 #222, 36px 18px 0 #5abaff, 42px 18px 0 #3a8adf,
      6px 24px 0 #3a8adf, 12px 24px 0 #5abaff, 18px 24px 0 #5abaff, 24px 24px 0 #5abaff, 30px 24px 0 #5abaff, 36px 24px 0 #5abaff, 42px 24px 0 #3a8adf,
      6px 30px 0 #2a6abf, 12px 30px 0 #3a8adf, 18px 30px 0 #5abaff, 24px 30px 0 #ddd, 30px 30px 0 #5abaff, 36px 30px 0 #3a8adf, 42px 30px 0 #2a6abf,
      /* Bottom */
      12px 36px 0 #2a6abf, 18px 36px 0 #3a8adf, 24px 36px 0 #3a8adf, 30px 36px 0 #3a8adf, 36px 36px 0 #2a6abf,
      18px 42px 0 #2a6abf, 24px 42px 0 #2a6abf, 30px 42px 0 #2a6abf;
    transform: scale(1.8);
    transform-origin: bottom right;
  }

  /* --- Decorative sword icons near title --- */
  .sword-left, .sword-right {
    position: absolute;
    top: 50%;
    transform: translateY(-70%);
    z-index: 10;
    font-size: 48px;
    opacity: 0.15;
    color: #ffd700;
  }
  .sword-left { left: 40px; }
  .sword-right { right: 40px; }

  /* --- HP bar decoration --- */
  .hp-bar {
    position: absolute;
    top: 30px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 10px;
    z-index: 10;
  }
  .hp-label {
    font-family: 'Press Start 2P', monospace;
    font-size: 12px;
    color: #ff6b6b;
  }
  .hp-track {
    width: 200px;
    height: 14px;
    background: #1a1a2e;
    border: 2px solid #444;
    border-radius: 2px;
    overflow: hidden;
  }
  .hp-fill {
    width: 75%;
    height: 100%;
    background: linear-gradient(to bottom, #ff6b6b, #cc3333);
  }

  /* --- Timer decoration --- */
  .timer-deco {
    position: absolute;
    bottom: 25px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Press Start 2P', monospace;
    font-size: 14px;
    color: #ffd700;
    opacity: 0.4;
    letter-spacing: 3px;
    z-index: 10;
  }
</style>
</head>
<body>

<!-- Stars scattered across the sky -->
<div class="star" style="top:45px;left:80px;width:2px;height:2px;animation-delay:0s;"></div>
<div class="star" style="top:90px;left:250px;width:3px;height:3px;animation-delay:0.5s;"></div>
<div class="star" style="top:30px;left:400px;width:2px;height:2px;animation-delay:1.2s;"></div>
<div class="star" style="top:120px;left:550px;width:2px;height:2px;animation-delay:0.3s;"></div>
<div class="star" style="top:60px;left:700px;width:3px;height:3px;animation-delay:0.8s;"></div>
<div class="star" style="top:100px;left:850px;width:2px;height:2px;animation-delay:1.5s;"></div>
<div class="star" style="top:40px;left:1000px;width:2px;height:2px;animation-delay:0.2s;"></div>
<div class="star" style="top:150px;left:1100px;width:3px;height:3px;animation-delay:0.7s;"></div>
<div class="star" style="top:80px;left:150px;width:2px;height:2px;animation-delay:1.0s;"></div>
<div class="star" style="top:170px;left:350px;width:2px;height:2px;animation-delay:0.4s;"></div>
<div class="star" style="top:55px;left:950px;width:2px;height:2px;animation-delay:1.8s;"></div>
<div class="star" style="top:130px;left:750px;width:2px;height:2px;animation-delay:0.6s;"></div>
<div class="star" style="top:25px;left:600px;width:3px;height:3px;animation-delay:1.4s;"></div>
<div class="star" style="top:190px;left:180px;width:2px;height:2px;animation-delay:0.9s;"></div>
<div class="star" style="top:200px;left:1050px;width:2px;height:2px;animation-delay:1.1s;"></div>
<div class="star" style="top:70px;left:480px;width:2px;height:2px;animation-delay:1.6s;"></div>

<!-- Ground -->
<div class="ground"></div>

<!-- Vignette -->
<div class="vignette"></div>

<!-- HP bar deco -->
<div class="hp-bar">
  <span class="hp-label">HP</span>
  <div class="hp-track"><div class="hp-fill"></div></div>
</div>

<!-- Decorative swords -->
<div class="sword-left">&#x2694;</div>
<div class="sword-right">&#x2694;</div>

<!-- Main content -->
<div class="content">
  <div class="title">クエストタイマー</div>
  <div class="subtitle">&#x2694;&#xFE0F; 冒険しながら集中しよう</div>
  <div class="catchcopy">RPG &times; ポモドーロタイマー</div>
</div>

<!-- Pixel Hero -->
<div class="hero"></div>

<!-- Pixel Slime -->
<div class="slime"></div>

<!-- Timer deco -->
<div class="timer-deco">25:00</div>

</body>
</html>
